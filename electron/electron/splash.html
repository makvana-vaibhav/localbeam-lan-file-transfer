<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LocalBeam</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #FDFBF7;
      font-family: -apple-system, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      user-select: none;
      -webkit-app-region: drag;
    }

    .logo-wrap {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 32px;
    }

    .logo-icon {
      width: 48px;
      height: 48px;
      background: #8B5E34;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
    }

    .logo-text {
      font-size: 26px;
      font-weight: 700;
      color: #2B241D;
      letter-spacing: -0.5px;
    }

    .logo-text span { color: #8B5E34; }

    .spinner-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    .spinner {
      width: 28px;
      height: 28px;
      border: 2.5px solid #E6DECE;
      border-top-color: #8B5E34;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #status {
      font-size: 13px;
      color: #8E7F6C;
      font-weight: 400;
      letter-spacing: 0.01em;
    }

    .version {
      position: absolute;
      bottom: 18px;
      font-size: 11px;
      color: #C4B9A8;
      font-family: monospace;
    }
  </style>
</head>
<body>
  <div class="logo-wrap">
    <div class="logo-icon">⚡</div>
    <div class="logo-text">Local<span>Beam</span></div>
  </div>

  <div class="spinner-wrap">
    <div class="spinner"></div>
    <div id="status">Starting server...</div>
  </div>

  <div class="version">v1.0.0</div>

  <script>
    // Animate status text
    const messages = [
      'Starting server...',
      'Checking network...',
      'Almost ready...',
    ];
    let i = 0;
    const el = document.getElementById('status');
    setInterval(() => {
      i = (i + 1) % messages.length;
      el.textContent = messages[i];
    }, 1800);
  </script>
</body>
</html>
