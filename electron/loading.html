<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Starting LocalBeam…</title>
  <style>
    :root {
      --bg: #fdfbf7;
      --surface: #ffffff;
      --border: #e6dece;
      --text: #2b241d;
      --text-muted: #8e7f6c;
      --accent: #8b5e34;
    }

    body {
      margin: 0;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(to bottom, #fdfbf7 0, #ffffff 180px);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
    }

    .card {
      width: min(520px, 92vw);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 28px;
      box-shadow: 0 2px 14px rgba(0,0,0,0.04);
    }

    h1 {
      margin: 0;
      font-size: 22px;
      color: var(--accent);
    }

    p {
      margin: 8px 0 0;
      color: var(--text-muted);
      font-size: 14px;
    }

    .bar-wrap {
      margin-top: 22px;
      background: #f6f1e8;
      border: 1px solid var(--border);
      border-radius: 999px;
      overflow: hidden;
      height: 8px;
    }

    .bar {
      width: 40%;
      height: 100%;
      background: var(--accent);
      animation: loading 1.6s infinite ease-in-out;
    }

    @keyframes loading {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(350%); }
    }
  </style>
</head>
<body>
  <section class="card">
    <h1>LocalBeam</h1>
    <p>Starting local server… please wait.</p>
    <div class="bar-wrap"><div class="bar"></div></div>
  </section>
</body>
</html>
