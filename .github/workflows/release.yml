  # ── 5. Create GitHub Release ──────────────────────────────────────────────
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-android, build-linux, build-windows]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        run: |
          VERSION=${GITHUB_REF_NAME:-${{ github.event.inputs.version }}}
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets/
          merge-multiple: true

      - name: List release assets
        run: ls -lh release-assets/

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s" --no-merges | head -20)
          else
            COMMITS=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s" --no-merges)
          fi
          echo "commits<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMITS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: "LocalBeam ${{ steps.version.outputs.version }}"
          draft: false
          prerelease: false
          body: |
            ## LocalBeam ${{ steps.version.outputs.version }}

            Offline cross-platform file transfer between Android and desktop over local WiFi.
            No internet. No cables. No accounts.

            ---

            ## Downloads

            | Platform | File | Notes |
            |----------|------|-------|
            | Android | `LocalBeam-*-android.apk` | Enable "Install unknown apps" in Settings |
            | Linux | `LocalBeam-*.AppImage` | `chmod +x` then run — no install needed |
            | Linux | `localbeam_*.deb` | `sudo dpkg -i filename.deb` |
            | Windows | `LocalBeam-Setup-*.exe` | Run the installer |

            ---

            ## What changed
            ${{ steps.changelog.outputs.commits }}

            ---
            Both devices must be on the same WiFi network. No internet required.
          files: release-assets/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}