name: Build & Release

on:
  push:
    tags:
      - 'v*'          # triggers on v1.0.0, v1.2.3, etc.

  workflow_dispatch:  # allows manual trigger from GitHub UI
    inputs:
      version:
        description: 'Version tag (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write   # needed to create releases and upload assets

jobs:

  # ── 1. Build Android APK ────────────────────────────────────────────────────
  build-android:
    name: Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x android-app/gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android-app/**/*.gradle*', 'android-app/**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Build debug APK
        working-directory: android-app
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: |
          VERSION=${GITHUB_REF_NAME:-${{ github.event.inputs.version }}}
          mv android-app/app/build/outputs/apk/debug/app-debug.apk \
             LocalBeam-${VERSION}-android.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: LocalBeam-*-android.apk
          retention-days: 7

  # ── 2. Build Linux AppImage + deb ──────────────────────────────────────────
  build-linux:
    name: Linux (AppImage + deb)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            server/package-lock.json
            electron/package-lock.json

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Install electron dependencies
        working-directory: electron
        run: npm ci

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libnotify-dev \
            libnss3 \
            libxss1 \
            libxtst6 \
            xvfb \
            imagemagick

      - name: Generate app icon
        working-directory: electron
        run: |
          mkdir -p electron/assets
          convert -size 512x512 \
            xc:'#8B5E34' \
            -fill white \
            -font DejaVu-Sans-Bold \
            -pointsize 280 \
            -gravity center \
            -annotate 0 'LB' \
            electron/assets/icon.png
          cp electron/assets/icon.png electron/assets/tray-icon.png

      - name: Build Linux packages
        working-directory: electron
        run: npm run dist:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List build output
        run: ls -lh electron/dist/

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-builds
          path: |
            electron/dist/*.AppImage
            electron/dist/*.deb
          retention-days: 7

  # ── 3. Build Windows .exe ──────────────────────────────────────────────────
  build-windows:
    name: Windows (.exe)
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            server/package-lock.json
            electron/package-lock.json

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Install electron dependencies
        working-directory: electron
        run: npm ci

      - name: Create placeholder icon
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path electron/electron/assets
          # Download a simple colored square as placeholder icon
          # In production replace with your real icon files
          Add-Type -AssemblyName System.Drawing
          $bmp = New-Object System.Drawing.Bitmap(256, 256)
          $g = [System.Drawing.Graphics]::FromImage($bmp)
          $g.Clear([System.Drawing.Color]::FromArgb(139, 94, 52))
          $font = New-Object System.Drawing.Font("Arial", 80, [System.Drawing.FontStyle]::Bold)
          $brush = New-Object System.Drawing.SolidBrush([System.Drawing.Color]::White)
          $g.DrawString("LB", $font, $brush, 40, 80)
          $bmp.Save("electron/electron/assets/icon.png", [System.Drawing.Imaging.ImageFormat]::Png)
          Copy-Item electron/electron/assets/icon.png electron/electron/assets/icon.ico

      - name: Build Windows installer
        working-directory: electron
        run: npm run dist:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-builds
          path: electron/dist/*.exe
          retention-days: 7

  # ── 4. Build macOS .dmg ─────────────────────────────────────────────────────
  build-macos:
    name: macOS (.dmg)
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            server/package-lock.json
            electron/package-lock.json

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Install electron dependencies
        working-directory: electron
        run: npm ci

      - name: Generate app icon
        run: |
          mkdir -p electron/electron/assets
          # Create PNG icon using sips (built into macOS)
          python3 -c "
          import struct, zlib
          def png(w, h, color):
              def chunk(t, d):
                  c = zlib.crc32(t+d) & 0xffffffff
                  return struct.pack('>I',len(d))+t+d+struct.pack('>I',c)
              sig = b'\x89PNG\r\n\x1a\n'
              ihdr = chunk(b'IHDR', struct.pack('>IIBBBBB',w,h,8,2,0,0,0))
              raw = b''.join(b'\x00'+bytes([color[0],color[1],color[2]])*w for _ in range(h))
              idat = chunk(b'IDAT', zlib.compress(raw))
              iend = chunk(b'IEND', b'')
              return sig+ihdr+idat+iend
          with open('electron/electron/assets/icon.png','wb') as f:
              f.write(png(512,512,[139,94,52]))
          "
          cp electron/electron/assets/icon.png electron/electron/assets/tray-icon.png
          # Create .icns from PNG
          mkdir -p icon.iconset
          sips -z 16 16     electron/electron/assets/icon.png --out icon.iconset/icon_16x16.png
          sips -z 32 32     electron/electron/assets/icon.png --out icon.iconset/icon_16x16@2x.png
          sips -z 32 32     electron/electron/assets/icon.png --out icon.iconset/icon_32x32.png
          sips -z 64 64     electron/electron/assets/icon.png --out icon.iconset/icon_32x32@2x.png
          sips -z 128 128   electron/electron/assets/icon.png --out icon.iconset/icon_128x128.png
          sips -z 256 256   electron/electron/assets/icon.png --out icon.iconset/icon_128x128@2x.png
          sips -z 256 256   electron/electron/assets/icon.png --out icon.iconset/icon_256x256.png
          sips -z 512 512   electron/electron/assets/icon.png --out icon.iconset/icon_256x256@2x.png
          sips -z 512 512   electron/electron/assets/icon.png --out icon.iconset/icon_512x512.png
          iconutil -c icns icon.iconset -o electron/electron/assets/icon.icns

      - name: Build macOS DMG
        working-directory: electron
        run: npm run dist:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false  # skip code signing

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-builds
          path: |
            electron/dist/*.dmg
            electron/dist/*.zip
          retention-days: 7

  # ── 5. Create GitHub Release ────────────────────────────────────────────────
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-android, build-linux, build-windows, build-macos]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for changelog

      - name: Get version
        id: version
        run: |
          VERSION=${GITHUB_REF_NAME:-${{ github.event.inputs.version }}}
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Building release for ${VERSION}"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets/
          merge-multiple: true

      - name: List release assets
        run: ls -lh release-assets/

      - name: Generate changelog
        id: changelog
        run: |
          # Get commits since last tag
          PREV_TAG=$(git tag --sort=-version:refname | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s" --no-merges | head -20)
          else
            COMMITS=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s" --no-merges)
          fi
          echo "commits<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMITS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: "LocalBeam ${{ steps.version.outputs.version }}"
          draft: false
          prerelease: false
          generate_release_notes: false
          body: |
            ## LocalBeam ${{ steps.version.outputs.version }}

            Offline cross-platform file transfer between Android and desktop over local WiFi.

            ---

            ## Downloads

            | Platform | File | Notes |
            |----------|------|-------|
            | Android | `LocalBeam-*-android.apk` | Enable "Install unknown apps" in Settings |
            | Linux | `LocalBeam-*.AppImage` | `chmod +x` then run |
            | Linux | `localbeam_*.deb` | `sudo dpkg -i` to install |
            | Windows | `LocalBeam-Setup-*.exe` | Run installer |
            | macOS | `LocalBeam-*.dmg` | Drag to Applications |

            ---

            ## Installation

            **Linux AppImage (recommended for Linux):**
            ```bash
            chmod +x LocalBeam-${{ steps.version.outputs.version }}-linux.AppImage
            ./LocalBeam-${{ steps.version.outputs.version }}-linux.AppImage
            ```

            **Android APK:**
            1. Download the `.apk` file to your phone
            2. Settings → Security → Enable "Install unknown apps"
            3. Open the APK to install

            ---

            ## What's changed
            ${{ steps.changelog.outputs.commits }}

            ---

            ## Requirements
            - Android 7.0+ for mobile app
            - Both devices on same WiFi network
            - No internet connection required
          files: release-assets/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}