name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:

  # ── 1. Build Android APK ──────────────────────────────────────────────────
  build-android:
    name: Android APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android-app/**/*.gradle*', 'android-app/**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Grant gradlew permission
        run: chmod +x android-app/gradlew

      - name: Build debug APK
        working-directory: android-app
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: |
          VERSION=${GITHUB_REF_NAME:-${{ github.event.inputs.version }}}
          mv android-app/app/build/outputs/apk/debug/app-debug.apk \
             LocalBeam-${VERSION}-android.apk

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: LocalBeam-*-android.apk
          retention-days: 7

  # ── 2. Build Linux AppImage + deb ─────────────────────────────────────────
  build-linux:
    name: Linux (AppImage + deb)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd server && npm ci
          cd ../electron && npm ci

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y imagemagick libgtk-3-0 libnotify4 libnss3 libxss1 libxtst6

      - name: Generate PNG icon
        run: |
          mkdir -p electron/electron/assets
          convert -size 512x512 xc:'#8B5E34' \
            -fill white -font DejaVu-Sans-Bold \
            -pointsize 260 -gravity center \
            -annotate 0 'LB' \
            electron/electron/assets/icon.png
          cp electron/electron/assets/icon.png electron/electron/assets/tray-icon.png

      - name: Patch package.json
        working-directory: electron
        run: |
          REPO_URL="https://github.com/${{ github.repository }}"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json','utf8'));
            pkg.homepage = '${REPO_URL}';
            pkg.repository = { type: 'git', url: '${REPO_URL}.git' };
            pkg.author = { name: 'LocalBeam', email: 'localbeam@users.noreply.github.com' };
            if (!pkg.build.deb) pkg.build.deb = {};
            pkg.build.linux.maintainer = 'LocalBeam <localbeam@users.noreply.github.com>';
            pkg.build.deb.maintainer   = 'LocalBeam <localbeam@users.noreply.github.com>';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "

      - name: Build Linux packages
        working-directory: electron
        run: npm run dist:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # no-sandbox is baked into main.js via app.commandLine.appendSwitch

      - uses: actions/upload-artifact@v4
        with:
          name: linux-builds
          path: |
            electron/dist/*.AppImage
            electron/dist/*.deb
          retention-days: 7

  # ── 3. Build Windows .exe ─────────────────────────────────────────────────
  build-windows:
    name: Windows (.exe)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd server; npm ci
          cd ..\electron; npm ci

      - name: Generate proper .ico file
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path electron\electron\assets | Out-Null
          Add-Type -AssemblyName System.Drawing
          $sizes = @(16, 32, 48, 256)
          $pngs  = @()
          foreach ($size in $sizes) {
            $bmp = New-Object System.Drawing.Bitmap($size, $size)
            $g   = [System.Drawing.Graphics]::FromImage($bmp)
            $g.SmoothingMode = [System.Drawing.Drawing2D.SmoothingMode]::AntiAlias
            $g.Clear([System.Drawing.Color]::FromArgb(255,139,94,52))
            $fontSize = [Math]::Max(6, [Math]::Floor($size * 0.42))
            $font  = New-Object System.Drawing.Font("Arial", $fontSize, [System.Drawing.FontStyle]::Bold)
            $brush = New-Object System.Drawing.SolidBrush([System.Drawing.Color]::White)
            $sf    = New-Object System.Drawing.StringFormat
            $sf.Alignment = [System.Drawing.StringAlignment]::Center
            $sf.LineAlignment = [System.Drawing.StringAlignment]::Center
            $g.DrawString("LB", $font, $brush, (New-Object System.Drawing.RectangleF(0,0,$size,$size)), $sf)
            $ms = New-Object System.IO.MemoryStream
            $bmp.Save($ms, [System.Drawing.Imaging.ImageFormat]::Png)
            $pngs += $ms.ToArray()
            $ms.Close(); $g.Dispose(); $bmp.Dispose()
          }
          # Write valid ICO binary
          $count  = $sizes.Count
          $header = [byte[]](0,0,1,0,$count,0)
          $offset = $header.Length + ($count * 16)
          $entries = @(); $datas = @()
          for ($i = 0; $i -lt $count; $i++) {
            $sz   = $sizes[$i]; $data = $pngs[$i]; $len = $data.Length
            $w    = if ($sz -eq 256) { 0 } else { $sz }
            $h    = if ($sz -eq 256) { 0 } else { $sz }
            $entries += [byte[]]@($w,$h,0,0,1,0,32,0,
              ($len -band 0xFF),(($len -shr 8) -band 0xFF),(($len -shr 16) -band 0xFF),(($len -shr 24) -band 0xFF),
              ($offset -band 0xFF),(($offset -shr 8) -band 0xFF),(($offset -shr 16) -band 0xFF),(($offset -shr 24) -band 0xFF))
            $datas += $data; $offset += $len
          }
          $ico = New-Object System.IO.MemoryStream
          $ico.Write($header,0,$header.Length)
          foreach ($e in $entries) { $ico.Write($e,0,$e.Length) }
          foreach ($d in $datas)   { $ico.Write($d,0,$d.Length) }
          [System.IO.File]::WriteAllBytes("$PWD\electron\electron\assets\icon.ico", $ico.ToArray())
          $ico.Close()
          Write-Host "ICO created: $((Get-Item electron\electron\assets\icon.ico).Length) bytes"

      - name: Patch package.json
        working-directory: electron
        shell: pwsh
        run: |
          $repoUrl = "https://github.com/${{ github.repository }}"
          $pkg = Get-Content package.json -Raw | ConvertFrom-Json
          $pkg | Add-Member -Force -NotePropertyName homepage -NotePropertyValue $repoUrl
          $pkg | Add-Member -Force -NotePropertyName repository -NotePropertyValue @{type="git";url="$repoUrl.git"}
          $pkg | Add-Member -Force -NotePropertyName author -NotePropertyValue @{name="LocalBeam";email="localbeam@users.noreply.github.com"}
          $pkg | ConvertTo-Json -Depth 10 | Set-Content package.json
          Write-Host "package.json patched"

      - name: Build Windows installer
        working-directory: electron
        run: npm run dist:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: windows-builds
          path: electron/dist/*.exe
          retention-days: 7

