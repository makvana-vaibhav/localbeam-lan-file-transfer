name: Build LocalBeam Desktop

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: localbeam-linux
            build_command: npx electron-builder --linux AppImage deb --publish never
            artifact_paths: |
              dist-desktop/*.AppImage
              dist-desktop/*.deb
          - os: windows-latest
            artifact_name: localbeam-windows
            build_command: npx electron-builder --win nsis --publish never
            artifact_paths: |
              dist-desktop/*.exe
          - os: macos-latest
            artifact_name: localbeam-macos
            build_command: npx electron-builder --mac dmg --publish never
            artifact_paths: |
              dist-desktop/*.dmg

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies (with lockfile fallback)
        shell: bash
        run: |
          if [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Build desktop artifacts
        run: ${{ matrix.build_command }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_paths }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Show release files
        run: find release-artifacts -type f | sort

      - name: Create release and upload binaries
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/**/*
          generate_release_notes: true
