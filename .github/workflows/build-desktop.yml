name: Build LocalBeam Desktop

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: localbeam-linux
            build_command: npm run dist:linux
            artifact_paths: |
              dist-desktop/*.AppImage
              dist-desktop/*.deb
              dist-desktop/linux-unpacked/**
          - os: windows-latest
            artifact_name: localbeam-windows
            build_command: npm run dist:win
            artifact_paths: |
              dist-desktop/*.exe
              dist-desktop/*.yml
              dist-desktop/win-unpacked/**
          - os: macos-latest
            artifact_name: localbeam-macos
            build_command: npm run dist:mac
            artifact_paths: |
              dist-desktop/*.dmg
              dist-desktop/*.zip
              dist-desktop/*.yml

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build desktop artifacts
        run: ${{ matrix.build_command }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_paths }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Show release files
        run: find release-artifacts -type f | sort

      - name: Create release and upload binaries
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/**/*
          generate_release_notes: true
