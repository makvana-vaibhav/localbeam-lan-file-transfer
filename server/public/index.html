<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LocalBeam — File Transfer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #ffffff;
      --surface: #faf8f4;
      --surface-hover: #f3eee4;
      --border: #e6dece;
      --border-soft: #efe8dc;
      --text: #1a1a1a;
      --text-secondary: #6a6256;
      --text-muted: #9b907f;
      --accent: #8b5e34;
      --accent-hover: #744c27;
      --tint-blue: #f9f2e8;
      --tint-green: #f6efe2;
      --success: #059669;
      --error: #dc2626;
      --warning: #d97706;
    }

    *, *::before, *::after { 
      box-sizing: border-box; 
      margin: 0; 
      padding: 0; 
    }

    body {
      background: linear-gradient(to bottom, #fdfbf7 0, #ffffff 180px);
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      line-height: 1.6;
    }

    /* Header */
    header {
      border-bottom: 1px solid var(--border);
      padding: 20px 0;
      background: var(--bg);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .container { 
      max-width: 1200px; 
      margin: 0 auto; 
      padding: 0 24px; 
    }

    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-text {
      font-size: 20px;
      font-weight: 700;
      color: #6f4b2a;
      letter-spacing: -0.5px;
    }

    .logo-sub {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 400;
      letter-spacing: 0.5px;
    }

    .server-status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--text-secondary);
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 8px 14px;
      border-radius: 4px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background: var(--success);
      border-radius: 50%;
      animation: pulse-dot 2s infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    /* Main Layout */
    main { 
      padding: 40px 0 60px; 
    }

    .grid {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 32px;
      align-items: start;
    }

    /* Cards */
    .card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
      box-shadow: 0 1px 0 rgba(0, 0, 0, 0.02);
    }

    .card-header {
      padding: 18px 20px;
      border-bottom: 1px solid var(--border);
      background: #fbfbfb;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card.accent-blue .card-header {
      background: var(--tint-blue);
      border-bottom-color: #eadbc8;
    }

    .card.accent-green .card-header {
      background: var(--tint-green);
      border-bottom-color: #e7d8bf;
    }

    .card-title {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: var(--text-secondary);
    }

    .card-body { 
      padding: 20px; 
    }

    /* Connection Info */
    .ip-display {
      font-size: 24px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
      word-break: break-all;
      font-family: 'Courier New', monospace;
    }

    .port-badge {
      display: inline-block;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 4px;
      margin-top: 8px;
      font-family: 'Courier New', monospace;
    }

    .qr-container {
      margin: 16px 0;
      background: white;
      border-radius: 4px;
      border: 1px solid var(--border);
      padding: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      aspect-ratio: 1;
    }

    .qr-container img { 
      width: 100%; 
      height: 100%; 
      object-fit: contain; 
    }

    .qr-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: var(--text-muted);
      font-size: 12px;
      height: 180px;
    }

    .copy-url-btn {
      width: 100%;
      padding: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 12px;
    }

    .copy-url-btn:hover {
      background: var(--surface-hover);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* Stats */
    .stats-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 12px;
    }

    .stat-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 12px;
    }

    .stat-value {
      font-size: 20px;
      font-weight: 600;
      color: var(--text);
    }

    .stat-label {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Upload Zone */
    .upload-zone {
      border: 2px dashed var(--border);
      border-radius: 6px;
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: #fdf9f2;
      position: relative;
    }

    .upload-zone:hover, .upload-zone.dragover {
      border-color: var(--accent);
      background: #fbf3e6;
    }

    .upload-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
    }

    .upload-subtitle {
      font-size: 13px;
      color: var(--text-muted);
    }

    .upload-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      font-size: 0;
    }

    /* Progress */
    .upload-progress {
      margin-top: 16px;
      display: none;
    }

    .upload-progress.visible { 
      display: block; 
    }

    .progress-bar-wrap {
      background: var(--surface);
      border-radius: 3px;
      height: 6px;
      overflow: hidden;
      margin-top: 8px;
      border: 1px solid var(--border);
    }

    .progress-bar {
      height: 100%;
      background: var(--accent);
      border-radius: 3px;
      width: 0%;
      transition: width 0.3s;
    }

    .progress-label {
      font-size: 12px;
      color: var(--text-secondary);
      display: flex;
      justify-content: space-between;
      margin-bottom: 4px;
    }

    /* File List */
    .file-list-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .badge {
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 4px;
      background: var(--tint-blue);
      border: 1px solid #e6d5be;
      color: #7b522c;
    }

    .search-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 8px 12px;
      font-size: 13px;
      color: var(--text);
      outline: none;
      width: 200px;
      transition: border-color 0.2s;
      font-family: 'Inter', sans-serif;
    }

    .search-box:focus { 
      border-color: var(--accent);
    }

    .search-box::placeholder { 
      color: var(--text-muted); 
    }

    .file-table {
      width: 100%;
      border-collapse: collapse;
    }

    .file-table-scroll {
      max-height: 390px;
      overflow-y: auto;
      overflow-x: hidden;
    }

    .file-table th {
      font-size: 11px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: var(--text-secondary);
      text-align: left;
      padding: 12px;
      border-bottom: 1px solid var(--border);
      font-weight: 600;
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 1;
    }

    .file-row {
      border-bottom: 1px solid var(--border-soft);
      transition: background 0.15s;
    }

    .file-row:nth-child(even) {
      background: #fdfbf8;
    }

    .file-row:hover { 
      background: #f8f1e6;
    }

    .file-row td { 
      padding: 12px; 
      vertical-align: middle; 
    }

    .file-table-scroll::-webkit-scrollbar {
      width: 8px;
    }

    .file-table-scroll::-webkit-scrollbar-thumb {
      background: #d7d7d7;
      border-radius: 8px;
    }

    .file-table-scroll::-webkit-scrollbar-thumb:hover {
      background: #c6c6c6;
    }

    .file-name-cell { 
      display: flex; 
      align-items: center; 
      gap: 12px; 
    }

    .file-icon {
      width: 32px;
      height: 32px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      flex-shrink: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      font-weight: 600;
    }

    .file-name {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      max-width: 240px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .file-size, .file-date {
      font-size: 12px;
      color: var(--text-secondary);
      font-family: 'Courier New', monospace;
    }

    .file-actions { 
      display: flex; 
      gap: 6px; 
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid transparent;
      text-decoration: none;
      font-family: 'Inter', sans-serif;
    }

    .btn-primary {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }
    .btn-primary:hover {
      background: var(--accent-hover);
      border-color: var(--accent-hover);
    }

    .btn-danger {
      background: transparent;
      border-color: var(--error);
      color: var(--error);
    }
    .btn-danger:hover { 
      background: #fef2f2;
    }

    .btn-ghost {
      background: transparent;
      border-color: var(--border);
      color: var(--text-secondary);
    }
    .btn-ghost:hover { 
      border-color: var(--text);
      color: var(--text);
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    .empty-title { 
      font-size: 15px; 
      font-weight: 500; 
      margin-bottom: 6px; 
      color: var(--text-secondary); 
    }

    .empty-sub { 
      font-size: 13px; 
    }

    /* Toast */
    .toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .toast {
      padding: 12px 18px;
      border-radius: 4px;
      font-size: 13px;
      border: 1px solid;
      animation: slide-in 0.3s ease;
      max-width: 320px;
    }

    .toast.success {
      background: #f0fdf4;
      border-color: var(--success);
      color: #166534;
    }

    .toast.error {
      background: #fef2f2;
      border-color: var(--error);
      color: #991b1b;
    }

    .toast.info {
      background: #eff6ff;
      border-color: var(--accent);
      color: #1e40af;
    }

    @keyframes slide-in {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    /* Responsive */
    @media (max-width: 900px) {
      .grid { 
        grid-template-columns: 1fr; 
      }
      .search-box {
        width: 100%;
      }
    }
  </style>
</head>
<body>

<header>
  <div class="container">
    <div class="header-inner">
      <div class="logo">
        <div>
          <div class="logo-text">LocalBeam</div>
          <div class="logo-sub">File Transfer</div>
        </div>
      </div>
      <div class="server-status">
        <div class="status-dot"></div>
        <span id="server-url-header">Loading…</span>
      </div>
    </div>
  </div>
</header>

<main>
  <div class="container">
    <div class="grid">

      <!-- Left sidebar -->
      <aside>

        <!-- Connection Info -->
        <div class="card accent-blue" style="margin-bottom:20px">
          <div class="card-header">
            <span class="card-title">Connection</span>
          </div>
          <div class="card-body">
            <div class="ip-display" id="server-ip">—.—.—.—</div>
            <div class="port-badge" id="server-port">PORT ····</div>

            <div class="qr-container" id="qr-wrap">
              <div class="qr-placeholder">
                <div>QR Code</div><div>Loading…</div>
              </div>
            </div>

            <button class="copy-url-btn" id="copy-url-btn" onclick="copyUrl()">
              Copy Network URL
            </button>
          </div>
        </div>

        <!-- Stats -->
        <div class="card accent-green">
          <div class="card-header">
            <span class="card-title">Storage</span>
            <button class="btn btn-ghost" onclick="refreshAll()" style="padding:4px 10px;font-size:11px">Refresh</button>
          </div>
          <div class="card-body">
            <div class="stats-row">
              <div class="stat-box">
                <div class="stat-value" id="stat-count">—</div>
                <div class="stat-label">Files</div>
              </div>
              <div class="stat-box">
                <div class="stat-value" id="stat-size">—</div>
                <div class="stat-label">Total Size</div>
              </div>
            </div>
          </div>
        </div>

      </aside>

      <!-- Right content -->
      <section>

        <!-- Upload zone -->
        <div class="card accent-blue" style="margin-bottom:24px">
          <div class="card-header">
            <span class="card-title">Upload Files</span>
            <span style="font-size:11px;color:var(--text-muted)">Max 2 GB per file</span>
          </div>
          <div class="card-body">
            <div class="upload-zone" id="upload-zone">
              <input type="file" id="file-input" multiple onchange="handleFileSelect(event)" />
              <div class="upload-title">Drop files here or click to browse</div>
              <div class="upload-subtitle">Any file type supported</div>
            </div>

            <div class="upload-progress" id="upload-progress">
              <div class="progress-label">
                <span id="progress-filename">Uploading…</span>
                <span id="progress-pct">0%</span>
              </div>
              <div class="progress-bar-wrap">
                <div class="progress-bar" id="progress-bar"></div>
              </div>
            </div>
          </div>
        </div>

        <!-- File list -->
        <div class="card">
          <div class="card-header">
            <div style="display:flex;align-items:center;gap:10px">
              <span class="card-title">Files</span>
              <span class="badge" id="file-count-badge">0</span>
            </div>
            <input class="search-box" type="text" placeholder="Search files…" oninput="filterFiles(this.value)" />
          </div>
          <div class="card-body" style="padding:0">
            <div id="file-list-container">
              <div class="empty-state">
                <div class="empty-title">No files yet</div>
                <div class="empty-sub">Upload files from this page or your Android device</div>
              </div>
            </div>
          </div>
        </div>

      </section>
    </div>
  </div>
</main>

<div class="toast-container" id="toast-container"></div>

<script>
  let allFiles = [];
  let serverInfo = {};

  async function init() {
    await Promise.all([fetchServerInfo(), fetchFiles(), fetchStats()]);
    setupDragDrop();
  }

  async function refreshAll() {
    await Promise.all([fetchFiles(), fetchStats()]);
    toast('Refreshed', 'info');
  }

  async function fetchServerInfo() {
    try {
      const res = await fetch('/api/info');
      serverInfo = await res.json();
      document.getElementById('server-ip').textContent = serverInfo.ip;
      document.getElementById('server-port').textContent = 'PORT ' + serverInfo.port;
      document.getElementById('server-url-header').textContent = serverInfo.url;

      if (serverInfo.qr) {
        const wrap = document.getElementById('qr-wrap');
        wrap.innerHTML = `<img src="${serverInfo.qr}" alt="QR Code" />`;
      }
    } catch (e) { console.error(e); }
  }

  function copyUrl() {
    navigator.clipboard.writeText(serverInfo.url || window.location.origin).then(() => {
      toast('URL copied to clipboard!', 'success');
    });
  }

  async function fetchStats() {
    try {
      const res = await fetch('/api/stats');
      const data = await res.json();
      document.getElementById('stat-count').textContent = data.fileCount;
      document.getElementById('stat-size').textContent = data.totalSizeFormatted;
    } catch (e) {}
  }

  async function fetchFiles() {
    try {
      const res = await fetch('/api/files');
      const data = await res.json();
      allFiles = data.files || [];
      document.getElementById('file-count-badge').textContent = allFiles.length;
      renderFiles(allFiles);
    } catch (e) { console.error(e); }
  }

  function filterFiles(query) {
    const q = query.toLowerCase();
    renderFiles(allFiles.filter(f => f.originalName.toLowerCase().includes(q)));
  }

  function getFileIcon(name) {
    const ext = name.split('.').pop().toLowerCase();
    const map = {
      jpg: 'IMG', jpeg: 'IMG', png: 'IMG', gif: 'IMG', webp: 'IMG', svg: 'IMG',
      mp4: 'VID', mkv: 'VID', avi: 'VID', mov: 'VID', webm: 'VID',
      mp3: 'AUD', wav: 'AUD', flac: 'AUD', aac: 'AUD', ogg: 'AUD',
      pdf: 'PDF', doc: 'DOC', docx: 'DOC', txt: 'TXT', md: 'TXT',
      xls: 'XLS', xlsx: 'XLS',
      zip: 'ZIP', rar: 'ZIP', tar: 'ZIP', gz: 'ZIP', '7z': 'ZIP',
      js: 'JS', ts: 'TS', py: 'PY', java: 'JAVA', kt: 'KT',
      html: 'HTML', css: 'CSS', json: 'JSON',
      apk: 'APK',
    };
    return map[ext] || 'FILE';
  }

  function renderFiles(files) {
    const container = document.getElementById('file-list-container');
    if (!files.length) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="empty-title">No files yet</div>
          <div class="empty-sub">Upload files from this page or your Android device</div>
        </div>`;
      return;
    }

    const rows = files.map(f => {
      const icon = getFileIcon(f.originalName);
      return `
        <tr class="file-row">
          <td>
            <div class="file-name-cell">
              <div class="file-icon">${icon}</div>
              <div class="file-name" title="${f.originalName}">${f.originalName}</div>
            </div>
          </td>
          <td><span class="file-size">${f.sizeFormatted}</span></td>
          <td><span class="file-date">${f.modifiedFormatted}</span></td>
          <td>
            <div class="file-actions">
              <a class="btn btn-primary" href="/api/download/${encodeURIComponent(f.name)}">Download</a>
              <button class="btn btn-danger" onclick="deleteFile('${f.name}')">Delete</button>
            </div>
          </td>
        </tr>`;
    }).join('');

    container.innerHTML = `
      <div class="file-table-scroll">
        <table class="file-table">
          <thead>
            <tr>
              <th>Name</th>
              <th>Size</th>
              <th>Modified</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
  }

  async function handleFileSelect(e) {
    const files = Array.from(e.target.files);
    if (!files.length) return;
    await uploadFiles(files);
    e.target.value = '';
  }

  async function uploadFiles(files) {
    const progressEl = document.getElementById('upload-progress');
    const bar = document.getElementById('progress-bar');
    const pct = document.getElementById('progress-pct');
    const fname = document.getElementById('progress-filename');

    progressEl.classList.add('visible');

    const formData = new FormData();
    files.forEach(f => formData.append('files', f));
    fname.textContent = files.length === 1 ? files[0].name : `${files.length} files`;

    try {
      await new Promise((resolve, reject) => {
        const xhr = new XMLHttpRequest();
        xhr.open('POST', '/api/upload');

        xhr.upload.onprogress = (e) => {
          if (e.lengthComputable) {
            const p = Math.round((e.loaded / e.total) * 100);
            bar.style.width = p + '%';
            pct.textContent = p + '%';
          }
        };

        xhr.onload = () => {
          if (xhr.status === 200) resolve(JSON.parse(xhr.responseText));
          else reject(new Error('Upload failed'));
        };
        xhr.onerror = () => reject(new Error('Network error'));
        xhr.send(formData);
      });

      toast(`${files.length} file(s) uploaded`, 'success');
      await Promise.all([fetchFiles(), fetchStats()]);
    } catch (err) {
      toast('Upload failed: ' + err.message, 'error');
    } finally {
      setTimeout(() => {
        progressEl.classList.remove('visible');
        bar.style.width = '0%';
        pct.textContent = '0%';
      }, 1200);
    }
  }

  async function deleteFile(name) {
    if (!confirm('Delete this file?')) return;
    try {
      const res = await fetch('/api/files/' + encodeURIComponent(name), { method: 'DELETE' });
      if (!res.ok) throw new Error('Delete failed');
      toast('File deleted', 'success');
      await Promise.all([fetchFiles(), fetchStats()]);
    } catch (e) {
      toast(e.message, 'error');
    }
  }

  function setupDragDrop() {
    const zone = document.getElementById('upload-zone');
    zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
    zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
    zone.addEventListener('drop', async (e) => {
      e.preventDefault();
      zone.classList.remove('dragover');
      const files = Array.from(e.dataTransfer.files);
      if (files.length) await uploadFiles(files);
    });
  }

  function toast(msg, type = 'info') {
    const el = document.createElement('div');
    el.className = `toast ${type}`;
    el.textContent = msg;
    document.getElementById('toast-container').appendChild(el);
    setTimeout(() => el.remove(), 3500);
  }

  init();
</script>
</body>
</html>
